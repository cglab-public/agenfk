name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.5) — leave blank to auto-bump patch'
        required: false

jobs:
  release:
    name: Bump, Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          INPUT="${{ github.event.inputs.version }}"
          if [ -n "$INPUT" ]; then
            echo "version=$INPUT" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            LATEST=${LATEST#v}
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
            echo "Auto-bumping patch: $LATEST → $NEXT"
            echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Bump version in all package.json files
        run: |
          node -e "
            const fs = require('fs');
            const { execSync } = require('child_process');
            const files = execSync(
              'find . -name package.json -not -path \"*/node_modules/*\" -not -path \"*/dist/*\"',
              { encoding: 'utf8' }
            ).trim().split('\n');
            files.forEach(f => {
              const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
              pkg.version = process.env.VERSION;
              fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
            });
          "
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json packages/*/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package distributable
        run: node scripts/package-dist.mjs

      - name: Create tag and GitHub release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" agenfk-dist.tar.gz \
            --title "v${VERSION}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
